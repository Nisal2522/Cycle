# docs/openapi.yaml — Swagger/OpenAPI definition for all REST endpoints (Requirements vii, 1, 2, 3)
openapi: 3.0.3
info:
  title: CycleLink API
  description: Secure RESTful API — Auth, Partner/Shop, Transactions/Scanner, Rewards
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Local v1

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, minLength: 2, maxLength: 50 }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [cyclist, partner, admin] }
                shopName: { type: string }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '400': { description: Validation error }
        '409': { description: Email already exists }

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: OK, returns user + token }
        '401': { description: Invalid credentials }

  /auth/google:
    post:
      summary: Google Sign-In
      tags: [Auth]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential: { type: string, description: Google ID token }
      responses:
        '200': { description: OK }
        '401': { description: Invalid token }

  /auth/stats:
    get:
      summary: Public stats (e.g. total users)
      tags: [Auth]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      totalUsers: { type: integer }

  /auth/profile:
    get:
      summary: Get current user profile
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { description: Not authorized }
    patch:
      summary: Update profile (name, profileImage)
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                profileImage: { type: string }
      responses:
        '200': { description: OK }
        '401': { description: Not authorized }

  /partner/profile:
    get:
      summary: Get partner shop profile
      tags: [Partner]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
        '403': { description: Partner only }
    patch:
      summary: Update partner profile
      tags: [Partner]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                shopName: { type: string }
                description: { type: string }
                address: { type: string }
                category: { type: string }
                phoneNumber: { type: string }
      responses:
        '200': { description: OK }
        '403': { description: Partner only }

  /partner/checkouts:
    get:
      summary: Partner checkouts (redemptions) with pagination
      tags: [Partner]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200': { description: OK }
        '403': { description: Partner only }

  /partner/scan-stats:
    get:
      summary: Scan stats for dashboard
      tags: [Partner]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }

  /transactions/redeem:
    patch:
      summary: Redeem cyclist tokens (manual)
      tags: [Transactions]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cyclistId, tokens]
              properties:
                cyclistId: { type: string }
                tokens: { type: number, minimum: 1 }
      responses:
        '200': { description: OK }
        '400': { description: Invalid or insufficient tokens }
        '403': { description: Partner only }

  /transactions/confirm:
    post:
      summary: Confirm checkout from scanned QR
      tags: [Transactions]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, cyclistId, tokenAmount]
              properties:
                transactionId: { type: string }
                mealName: { type: string }
                tokenAmount: { type: number }
                cyclistId: { type: string }
                cyclistName: { type: string }
                expiryTime: { type: string, format: date-time }
      responses:
        '200': { description: Checkout completed }
        '400': { description: Already used or expired }
        '403': { description: Partner only }

  /rewards:
    post:
      summary: Create reward (partner)
      tags: [Rewards]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, tokenCost]
              properties:
                title: { type: string }
                description: { type: string }
                tokenCost: { type: number, minimum: 1 }
                expiryDate: { type: string, format: date-time }
      responses:
        '201': { description: Created }
        '403': { description: Partner only }

  /rewards/partner/{id}:
    get:
      summary: Get rewards for a partner
      tags: [Rewards]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
        '403': { description: Can only view own rewards }

  /rewards/{id}:
    patch:
      summary: Update reward
      tags: [Rewards]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                tokenCost: { type: number }
                expiryDate: { type: string }
                active: { type: boolean }
      responses:
        '200': { description: OK }
        '403': { description: Own rewards only }
        '404': { description: Reward not found }
    delete:
      summary: Archive reward (soft delete)
      tags: [Rewards]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Archived }
        '403': { description: Own rewards only }
        '404': { description: Reward not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
